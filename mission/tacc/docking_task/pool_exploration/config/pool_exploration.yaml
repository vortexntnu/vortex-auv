/**:
  ros__parameters:
    # Topics
    line_sub_topic: "/line_detection/line_segments"
    pose_sub_topic: "/pose" 
    sonar_info_sub_topic: "/moby/fls/sonar_info"
    debug_topic: "/debug"

    # Publish
    publish_rate_ms: 200

    # Frames / TF
    odom_frame: "moby/odom"
    base_frame: "moby/base_link"
    sonar_frame: "moby/sonar_link"
    enu_to_ned: false

    # Corner/docking params
    min_wall_distance_m: 0.0
    max_wall_distance_m: 100.0

    far_wall_heading_angle_threshold: 1.6 # gammel?
    parallel_heading_angle_threshold_rad: 0.35
    perpendicular_heading_angle_threshold_rad: 1.2

    min_corner_angle_rad: 1.45
    max_corner_angle_rad: 1.75
    right_wall_offset_m: 4.3
    far_wall_offset_m: 3.0

    right_wall_max_y_m: 0.0
    far_wall_min_x_m: 0.0

    right_dist: -0.1 # ENDRE NAVN ?
    choose_right_corner: 1
    
    # Waypoint
    switching_threshold: 0.5
    overwrite_prior_waypoints: true
    take_priority: true

# FOR MAP LOGIC
    map_pub_topic: "/map" 
    map_frame: "map"

    # Map / grid
    size_x: 1000.0
    size_y: 1000.0
    resolution: 0.1
    frame_id: "map"

    # Map cells
    unknown_cell: -1
    occupied_cell: 100