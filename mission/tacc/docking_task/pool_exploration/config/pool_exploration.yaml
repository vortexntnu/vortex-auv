/**:
  ros__parameters:
    # Topics
    line_sub_topic: "/line_detection/line_segments"
    pose_sub_topic: "/pose" 
    sonar_info_sub_topic: "/moby/fls/sonar_info"
    map_pub_topic: "/map" 
    debug_topic: "/debug"

    # Publish
    publish_rate_ms: 200

    # Frames / TF

    map_frame: "map"
    odom_frame: "moby/odom"
    base_frame: "moby/base_link"
    sonar_frame: "moby/sonar_link"
    enu_to_ned: false

    # Map / grid
    size_x: 1000.0
    size_y: 1000.0
    resolution: 0.1
    frame_id: "map"

    # Map cells
    unknown_cell: -1
    occupied_cell: 100


    # Corner/docking params
    min_dist: 0.0
    max_dist: 100.0
    angle_threshold: 1.6
    min_angle: 1.45
    max_angle: 1.75
    right_wall_offset: 4.3
    far_wall_offset: 3.0

    right_dist: -0.1
    
    # Waypoint
    switching_threshold: 0.5
    overwrite_prior_waypoints: true
    take_priority: true

