name: Source Build

on:
  push:

  workflow_dispatch:

  pull_request:

jobs:
  source-build:
    uses: vortexntnu/vortex-ci/.github/workflows/reusable-codecov-build.yaml@feat/codecov
    with:
      ros2_distro: 'humble'
      os_name: 'ubuntu-22.04'
      python_version: '3.8'
      ref: ${{ github.ref_name }}
      before_install_target_dependencies: './requirements.sh'
      vcs_repo_file_url: 'https://raw.githubusercontent.com/vortexntnu/vortex-auv/main/dependencies.repos'
    secrets: inherit
