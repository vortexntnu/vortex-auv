name: Simulator Test
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *' # Runs daily at 01:00 UTC
jobs:
  call_reusable_workflow:
    strategy:
      matrix:
        test_script:
          - "tests/waypoint_navigation/simulator_test.sh"
          - "tests/los_test/simulator_test.sh"
    uses: vortexntnu/vortex-ci/.github/workflows/reusable-ros2-simulator-test.yml@ci/docker-deploy
    with:
      vcs_repos_file: "tests/dependencies.repos"
      setup_script: "tests/setup.sh"
      test_script: "${{ matrix.test_script }}"
      docker_image: "ghcr.io/vortexntnu/auv-image"
